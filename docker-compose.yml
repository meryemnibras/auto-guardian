# ============================================================================
# AI DriveX — runs the Next.js app in a container, bound to localhost only.
# Nginx (installed on the host by deploy.sh) reverse-proxies :443 → :3000
# and terminates SSL. This keeps the container simple and SSL battle-tested.
# ============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Public vars are inlined at build time — read from the .env file.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER}
        NEXT_PUBLIC_CALENDLY_URL: ${NEXT_PUBLIC_CALENDLY_URL}
    image: aidrivex-app
    container_name: aidrivex-app
    restart: unless-stopped
    # Bind to loopback so the app is only reachable through Nginx, never
    # directly from the public internet.
    ports:
      - "127.0.0.1:3000:3000"
    # Server-side secrets are injected at RUNTIME from the .env file.
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/landing"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
