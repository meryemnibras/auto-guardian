<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="AI DriveX">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3FA9FF"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background tile with rounded corners for maskable safety -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Stylized car silhouette + AI circuit lines -->
  <g transform="translate(56,140)" filter="url(#glow)">
    <!-- Car body -->
    <path d="
      M 60 180
      C 70 110, 130 70, 200 70
      L 280 70
      C 330 70, 370 110, 380 180
      L 380 220
      C 380 235, 370 245, 355 245
      L 45 245
      C 30 245, 20 235, 20 220
      L 20 180
      Z"
      fill="url(#accent)" opacity="0.95"/>

    <!-- Windshield -->
    <path d="
      M 105 175
      C 115 120, 150 95, 200 95
      L 270 95
      C 310 95, 335 120, 345 175
      Z"
      fill="#020617" opacity="0.85"/>

    <!-- Wheels -->
    <circle cx="110" cy="245" r="32" fill="#020617"/>
    <circle cx="110" cy="245" r="18" fill="url(#accent)"/>
    <circle cx="290" cy="245" r="32" fill="#020617"/>
    <circle cx="290" cy="245" r="18" fill="url(#accent)"/>

    <!-- AI circuit dots on front (sensor lines) -->
    <g fill="#3FA9FF">
      <circle cx="365" cy="195" r="5"/>
      <circle cx="372" cy="208" r="3"/>
      <circle cx="378" cy="220" r="4"/>
    </g>
    <g fill="#8B5CF6">
      <circle cx="35" cy="195" r="5"/>
      <circle cx="28" cy="208" r="3"/>
      <circle cx="22" cy="220" r="4"/>
    </g>
  </g>

  <!-- AI spark badge top-right -->
  <g transform="translate(360,90)">
    <circle r="40" fill="url(#accent)" opacity="0.18"/>
    <path d="M 0 -22 L 6 -6 L 22 0 L 6 6 L 0 22 L -6 6 L -22 0 L -6 -6 Z"
          fill="url(#accent)"/>
  </g>
</svg>
